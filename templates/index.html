<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alvis</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="topbar">
        <a href="/" class="topbar-title">alvis</a>
        <a href="/about" class="topbar-help">Help</a>
        <a href="https://github.com/idameitil/alvis" class="topbar-github" target="_blank" rel="noopener">
            <img src="https://cdn.simpleicons.org/github/ffffff" alt="GitHub" width="18" height="18">
        </a>
    </nav>

    <div class="container">
        <!-- Top bar: heading + actions -->
        <div class="groups-header">
            <div class="groups-header-left">
                <span class="groups-heading">Specify your groups</span>
                <span class="groups-or">or</span>
                <input type="file" id="zip-input" accept=".zip" style="display:none"
                       onchange="handleZipUpload(this)">
                <a href="#" class="link-action" onclick="document.getElementById('zip-input').click(); return false;">upload ZIP</a>
                <span class="groups-or">&middot;</span>
                <a href="#" class="link-action" onclick="loadExample(); return false;">try example data</a>
            </div>
        </div>

        <div id="upload-status"></div>

        <!-- Group cards (rendered dynamically) -->
        <div id="groups-container"></div>

        <div class="add-group-row">
            <button type="button" class="add-group-btn" onclick="addGroup()">+ Add group</button>
            <button type="button" class="add-group-btn add-cross-btn" onclick="addCross()">+ Add cross-alignment</button>
        </div>

        <!-- Cross-alignment card (rendered dynamically) -->
        <div id="cross-container"></div>

        <!-- Generate button -->
        <div id="action-section">
            <button id="generate-btn" onclick="generate()" disabled>Generate SVG</button>
        </div>

        <!-- Generating spinner -->
        <div id="generating-section" style="display:none">
            <h2>Generating...</h2>
            <div class="spinner"></div>
        </div>

        <!-- Result -->
        <div id="result-section" style="display:none">
            <h2>Result</h2>
            <div id="svg-container"></div>
            <div id="analysis-details" style="display:none">
                <div id="analysis-details-content"></div>
            </div>
            <div class="button-group">
                <button onclick="downloadSVG()">Download SVG</button>
                <button onclick="regenerate()" class="secondary-btn">Regenerate</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
