<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="6" fill="#2c3e50"/>

  <!-- Three alignment lines -->
  <line x1="4" y1="9" x2="28" y2="9" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="23" x2="28" y2="23" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Conserved-residue ticks (ClustalX-ish colors) -->
  <!-- Row 1 -->
  <line x1="8" y1="6" x2="8" y2="12" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="6" x2="15" y2="12" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="6" x2="22" y2="12" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>

  <!-- Row 2 -->
  <line x1="10" y1="13" x2="10" y2="19" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="13" x2="18" y2="19" stroke="#f39c12" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="13" x2="25" y2="19" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>

  <!-- Row 3 -->
  <line x1="7" y1="20" x2="7" y2="26" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="20" x2="14" y2="26" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="20" y2="26" stroke="#f39c12" stroke-width="2" stroke-linecap="round"/>

  <!-- Cross-conservation dashed lines connecting rows -->
  <line x1="15" y1="12" x2="18" y2="13" stroke="white" stroke-width="0.7" stroke-dasharray="1.5,1" opacity="0.5"/>
  <line x1="10" y1="19" x2="14" y2="20" stroke="white" stroke-width="0.7" stroke-dasharray="1.5,1" opacity="0.5"/>
</svg>
